version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crm_basico
      POSTGRES_USER: ${DB_USER:-crm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crm}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    deploy:
      restart_policy:
        condition: any

  backend:
    image: ghcr.io/gustavocastilho-hub/crm-basico-backend:latest
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${DB_USER:-crm}:${DB_PASSWORD}@postgres:5432/crm_basico
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?ACCESS_TOKEN_SECRET is required}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
      PORT: 3000
      NODE_ENV: production
    networks:
      - internal
    deploy:
      restart_policy:
        condition: any

  frontend:
    image: ghcr.io/gustavocastilho-hub/crm-basico-frontend:latest
    networks:
      - internal
      - network_public
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.crm-frontend-http.rule=Host(`crm-basico.strategicai.com.br`)"
        - "traefik.http.routers.crm-frontend-http.entrypoints=web"
        - "traefik.http.routers.crm-frontend-http.middlewares=redirect-to-https"
        - "traefik.http.routers.crm-frontend.rule=Host(`crm-basico.strategicai.com.br`)"
        - "traefik.http.routers.crm-frontend.entrypoints=websecure"
        - "traefik.http.routers.crm-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.crm-frontend.loadbalancer.server.port=80"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.docker.network=network_public"

networks:
  internal:
    driver: overlay
  network_public:
    external: true

volumes:
  pgdata:
